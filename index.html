<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Godwin Work Order</title>

<style>
body {
  font-family: Arial, sans-serif;
  background:#f4f4f4;
  margin:0;
  padding:20px;
}

.page {
  max-width:900px;
  margin:auto;
  background:#fff;
  padding:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1 {
  margin-bottom:10px;
}

.section {
  margin-top:20px;
}

.section-title {
  font-weight:bold;
  border-left:4px solid #f0b400;
  padding-left:8px;
  margin-bottom:8px;
}

table {
  width:100%;
  border-collapse:collapse;
}

th, td {
  border:1px solid #ddd;
  padding:6px;
  font-size:12px;
}

th {
  background:#f2f2f2;
}

input, textarea {
  width:100%;
  border:none;
  font-size:12px;
  font-family:inherit;
  outline:none;
}

textarea {
  resize:none;
  line-height:1.4;
  padding:4px;
}

button {
  margin-top:10px;
  padding:6px 10px;
  border:1px solid #ccc;
  background:#fff;
  cursor:pointer;
}

.footer {
  margin-top:30px;
  border-top:2px solid #ddd;
  padding-top:10px;
}

@media print {
  body {
    background:#fff;
    padding:0;
  }

  .page {
    box-shadow:none;
    margin:0;
  }

  button {
    display:none;
  }
}
</style>
</head>

<body>

<div class="page">

<h1>Godwin Home Solutions, LLC</h1>

<div class="section">
<div class="section-title">Customer Information</div>

<input placeholder="Customer name"><br><br>
<input placeholder="Address"><br><br>
<input placeholder="Phone"><br><br>

</div>

<div class="section">
<div class="section-title">Tasks & Labor</div>

<table>
<thead>
<tr>
<th style="width:25%">Description</th>
<th style="width:45%">Details</th>
<th style="width:10%">Qty</th>
<th style="width:20%">Price</th>
</tr>
</thead>

<tbody id="tasks-body">

<tr>
<td><input placeholder="Drywall repair"></td>
<td><textarea class="di" rows="2" placeholder="Patch, sand, and prep wall"></textarea></td>
<td><input></td>
<td><input placeholder="$0.00"></td>
</tr>

<tr>
<td><input placeholder="TV mounting"></td>
<td><textarea class="di" rows="2" placeholder="Mount TV and hide wires"></textarea></td>
<td><input></td>
<td><input placeholder="$0.00"></td>
</tr>

</tbody>
</table>

<button id="add-task">+ Add line</button>

</div>

<div class="footer">

<div>Signature: ___________________________</div><br>
<div>Date: ___________________________</div>

</div>

</div>

<script>

// ADD LINE
document.getElementById('add-task').addEventListener('click', function () {

  const tbody = document.getElementById('tasks-body');

  const tr = document.createElement('tr');

  tr.innerHTML = `
    <td><input></td>
    <td><textarea class="di" rows="2"></textarea></td>
    <td><input></td>
    <td><input placeholder="$0.00"></td>
  `;

  tbody.appendChild(tr);

});

// AUTO GROW TEXTAREA
document.addEventListener('input', function(e) {
  if (e.target.classList.contains('di')) {
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
  }
});

</script>

</body>
</html>
